name: Go Backend CI

on:
    push:
        branches: [master]

jobs:
    # Job1: Linting (Static Analysis)
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                go-version: '1.25'
            - name: golangci-lint
              uses: golangci/golangci-lint-action@v3
              with:
                version: v1.54

    # Job 2: Testing
    test:
        runs-on: ubuntu-latest
        needs: lint # Only run tests if linting passes
        steps:
            - uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                go-version: '1.25'
            - name: Run Tests
              run: go test -v ./...

    # Job 3: Build
    build:
        runs-on: ubuntu-latest
        needs: test # Only build if tests pass
        steps:
            - uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                go-version: '1.25'
            - name: Build Binary
              run: go build -v -o main .